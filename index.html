<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subham Grand | Management Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --bg: #ffffff; --text: #0f172a; --card: #f8fafc; --accent: #facc15; --border: #e2e8f0; }
        .dark-theme { --bg: #020617; --text: #f8fafc; --card: #0f172a; --accent: #0ea5e9; --border: #1e293b; }
        body { background-color: var(--bg); color: var(--text); transition: 0.3s ease; }
        .glass-panel { background: var(--card); border: 1px solid var(--border); }
        .table-header { background: var(--accent) !important; color: #000 !important; font-weight: 900; text-transform: uppercase; }
        .input-field { background: rgba(128,128,128,0.1); border: 1px solid var(--border); padding: 8px; border-radius: 6px; font-weight: bold; width: 100%; color: var(--text); }
        .shortage { color: #ef4444; font-weight: 900; }
        .surplus { color: #22c55e; font-weight: 900; }
    </style>
</head>
<body class="font-sans text-[11px] p-4 lg:p-8">

    <div class="flex flex-col lg:flex-row justify-between items-center mb-6 p-6 glass-panel rounded-2xl shadow-xl">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter uppercase">Subham <span class="text-yellow-500 dark:text-cyan-400">Grand</span></h1>
            <p class="opacity-60 font-bold uppercase text-[9px] tracking-[0.2em]">Manual Entry & Logistics Neural Network</p>
        </div>
        <div class="flex flex-wrap gap-2 mt-4 lg:mt-0">
            <button onclick="toggleTheme()" class="px-5 py-2 rounded-lg font-black bg-slate-800 text-white transition-all">🌓 THEME</button>
            <button onclick="exportStyledExcel()" class="px-5 py-2 rounded-lg font-black bg-emerald-600 text-white shadow-lg">📥 EXCEL</button>
            <button onclick="toggleCharts()" class="px-5 py-2 rounded-lg font-black bg-indigo-600 text-white">CHARTS</button>
            <button onclick="document.getElementById('uploadInput').click()" class="px-5 py-2 rounded-lg font-black bg-slate-300 text-slate-800">SYNC</button>
            <input type="file" id="uploadInput" class="hidden" onchange="handleFileUpload(event)">
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">
        <div class="p-4 glass-panel rounded-xl">
            <label class="block font-black uppercase text-[9px] mb-1 opacity-60">Add New Branch</label>
            <div class="flex gap-2">
                <input type="text" id="newBranch" placeholder="Branch Name" class="input-field">
                <button onclick="addBranch()" class="bg-blue-600 text-white px-4 rounded font-bold uppercase">+</button>
            </div>
        </div>
        <div class="p-4 glass-panel rounded-xl">
            <label class="block font-black uppercase text-[9px] mb-1 opacity-60">Add New Category</label>
            <div class="flex gap-2">
                <input type="text" id="newCategory" placeholder="Category Name" class="input-field">
                <button onclick="addCategory()" class="bg-blue-600 text-white px-4 rounded font-bold uppercase">+</button>
            </div>
        </div>
        <div class="p-4 glass-panel rounded-xl">
            <label class="block font-black uppercase text-[9px] mb-1 opacity-60">Quick Target Update</label>
            <div class="flex gap-1">
                <select id="updateCat" class="input-field text-[10px]"></select>
                <select id="updateBranch" class="input-field text-[10px]"></select>
                <input type="number" id="newTargetVal" placeholder="Qty" class="input-field w-20">
                <button onclick="updateTarget()" class="bg-yellow-500 text-black px-4 rounded font-black uppercase">SET</button>
            </div>
        </div>
    </div>

    <div id="analyticsSection" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
        <div class="lg:col-span-2 p-6 glass-panel rounded-2xl h-80"><canvas id="mainChart"></canvas></div>
        <div class="p-6 glass-panel rounded-2xl h-80"><canvas id="healthChart"></canvas></div>
    </div>

    <div class="overflow-hidden rounded-2xl border border-slate-200 dark:border-slate-800 shadow-2xl">
        <table class="w-full text-center border-collapse">
            <thead>
                <tr class="table-header">
                    <th class="p-4 text-left">Category</th>
                    <th>Branch</th>
                    <th>Base Target</th>
                    <th>Actual Stock</th>
                    <th>Gap</th>
                    <th class="bg-slate-900 text-cyan-400">AI Suggestion</th>
                </tr>
            </thead>
            <tbody id="tableBody" class="font-bold"></tbody>
        </table>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden flex items-center justify-center z-50 p-4">
        <div class="glass-panel rounded-3xl w-full max-w-2xl shadow-2xl border-t-8 border-yellow-500 dark:border-cyan-500">
            <div class="p-8 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center">
                <h2 id="modalStore" class="text-3xl font-black italic uppercase"></h2>
                <button onclick="closeModal()" class="text-4xl opacity-50">&times;</button>
            </div>
            <div id="modalBody" class="p-8 space-y-4 max-h-[50vh] overflow-y-auto"></div>
            <div class="p-6 bg-slate-50 dark:bg-slate-900/50"><button onclick="closeModal()" class="w-full py-4 bg-slate-900 text-white rounded-xl font-black uppercase">Close Report</button></div>
        </div>
    </div>

    <script>
        let stores = ["SG HYD", "SG", "SGRJY", "SGTNL", "SIRI ELR", "ST", "TUNI", "SIRICPT", "VS"];
        let inventoryData = [
            { name: "Silk Work", base: [185, 370, 185, 295, 245, 295, 345, 50, 295], present: [140, 320, 210, 280, 260, 295, 310, 45, 305] },
            { name: "BNS Handloom", base: [450, 1000, 450, 800, 700, 700, 800, 400, 800], present: [410, 950, 480, 790, 720, 680, 840, 390, 820] },
            { name: "Pattu", base: [125, 150, 125, 200, 100, 175, 250, 100, 250], present: [110, 160, 140, 185, 115, 190, 240, 95, 270] }
        ];

        let mChart, hChart;

        function getLogic(ci, si) {
            const cat = inventoryData[ci];
            const gap = cat.present[si] - cat.base[si];
            if (gap < 0) {
                let best = cat.present.map((p, i) => ({i, s: p - cat.base[i]})).filter(c => c.s > 5).sort((a,b) => b.s - a.s)[0];
                return best ? {type:'TRANSFER', qty: Math.min(Math.abs(gap), best.s), from: stores[best.i]} : {type:'PURCHASE', qty: Math.abs(gap)};
            }
            return {type:'OK'};
        }

        function addBranch() {
            const name = document.getElementById('newBranch').value.toUpperCase();
            if(name) {
                stores.push(name);
                inventoryData.forEach(c => { c.base.push(0); c.present.push(0); });
                render(); document.getElementById('newBranch').value = "";
            }
        }

        function addCategory() {
            const name = document.getElementById('newCategory').value.toUpperCase();
            if(name) {
                const base = Array(stores.length).fill(0);
                const present = Array(stores.length).fill(0);
                inventoryData.push({ name, base, present });
                render(); document.getElementById('newCategory').value = "";
            }
        }

        function updateTarget() {
            const ci = document.getElementById('updateCat').value;
            const si = document.getElementById('updateBranch').value;
            const val = parseInt(document.getElementById('newTargetVal').value);
            if(!isNaN(val)) { inventoryData[ci].base[si] = val; render(); }
        }

        function render() {
            const body = document.getElementById('tableBody');
            const uCat = document.getElementById('updateCat');
            const uBranch = document.getElementById('updateBranch');
            let rows = "", cOpts = "", bOpts = "";
            
            inventoryData.forEach((c, ci) => {
                cOpts += `<option value="${ci}">${c.name}</option>`;
                c.base.forEach((b, si) => {
                    const p = c.present[si], g = p - b, a = getLogic(ci, si);
                    rows += `<tr class="border-b border-slate-100 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-900">
                        <td class="p-3 text-left font-bold opacity-50 uppercase">${c.name}</td>
                        <td onclick="openModal(${si})" class="font-black text-blue-600 dark:text-cyan-400 cursor-pointer underline">${stores[si]}</td>
                        <td>${b}</td><td>${p}</td>
                        <td class="${g < 0 ? 'shortage' : 'surplus'}">${g > 0 ? '+' + g : g}</td>
                        <td class="text-[9px] uppercase font-black">${a.type==='TRANSFER'?`🚚 MOVE ${a.qty} FROM ${a.from}`:a.type==='PURCHASE'?`🛒 BUY ${a.qty}`:'STABLE'}</td>
                    </tr>`;
                });
            });
            stores.forEach((s, si) => bOpts += `<option value="${si}">${s}</option>`);
            body.innerHTML = rows; uCat.innerHTML = cOpts; uBranch.innerHTML = bOpts;
        }

        async function exportStyledExcel() {
            const wb = new ExcelJS.Workbook();
            const ws = wb.addWorksheet('Logistics');
            ws.columns = [{header:'STORE', key:'s'}, {header:'CATEGORY', key:'c'}, {header:'TARGET', key:'b'}, {header:'STOCK', key:'p'}, {header:'ACTION', key:'a', width:30}];
            inventoryData.forEach((cat, ci) => cat.base.forEach((b, si) => {
                const p = cat.present[si], a = getLogic(ci, si);
                const row = ws.addRow({s:stores[si], c:cat.name, b:b, p:p, a: a.type==='TRANSFER'?`MOVE ${a.qty} FROM ${a.from}`:a.type==='PURCHASE'?`BUY ${a.qty}`:'OK'});
                let color = a.type==='PURCHASE' ? 'FFFEE2E2' : (a.type==='TRANSFER' ? 'FFDBEAFE' : 'FFDCFCE7');
                row.eachCell(cell => { cell.fill = {type:'pattern', pattern:'solid', fgColor:{argb:color}}; cell.font = {bold:true}; });
            }));
            saveAs(new Blob([await wb.xlsx.writeBuffer()]), 'SubhamGrand_Logistics.xlsx');
        }

        function toggleTheme() { document.body.classList.toggle('dark-theme'); }
        function toggleCharts() { document.getElementById('analyticsSection').classList.toggle('hidden'); updateCharts(); }
        function openModal(si) {
            document.getElementById('modalStore').innerText = stores[si];
            let h = "";
            inventoryData.forEach((c, ci) => {
                const a = getLogic(ci, si), g = c.present[si] - c.base[si];
                h += `<div class="p-5 rounded-2xl bg-white/5 border-l-8 ${g < 0 ? 'border-red-500' : 'border-green-500'} glass-panel">
                    <div class="flex justify-between text-[10px] font-black uppercase opacity-50 mb-1"><span>${c.name}</span><span>GAP: ${g}</span></div>
                    <div class="text-xl font-black">${a.type==='PURCHASE'?'🛒 BUY '+a.qty : a.type==='TRANSFER'?'🚚 MOVE '+a.qty : '✅ OPTIMAL'}</div>
                </div>`;
            });
            document.getElementById('modalBody').innerHTML = h; document.getElementById('modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function handleFileUpload() { inventoryData.forEach(c => c.present = c.base.map(b => Math.floor(b * (0.8 + Math.random())))); render(); }
        window.onload = render;
    </script>
</body>
</html>
