<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subham Grand | Excel Intelligence Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .yellow-header { background-color: #facc15; font-weight: bold; text-transform: uppercase; border: 1px solid #000; }
        .table-cell { border: 1px solid #000; padding: 6px; text-align: center; }
        .shortage { color: #ef4444; font-weight: bold; }
        .surplus { color: #22c55e; font-weight: bold; }
        /* High Contrast Action Style */
        .action-container { background-color: #000; color: #fff; padding: 4px; border-radius: 4px; font-weight: 800; font-size: 9px; }
        .text-purchase { color: #f87171; }
        .text-transfer { color: #60a5fa; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-[11px]">

    <div class="max-w-full mx-auto p-4 bg-white shadow-2xl min-h-screen">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-slate-900 p-4 text-white rounded border-b-4 border-yellow-500">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter uppercase">Subham Grand</h1>
                <p class="text-yellow-400 font-bold uppercase tracking-widest text-[9px]">Logistics Engine & Excel Reporting</p>
            </div>
            <div class="flex gap-2">
                <button onclick="exportToExcel()" class="bg-blue-600 px-4 py-2 rounded font-bold hover:bg-blue-500 border-b-2 border-blue-900 uppercase">📥 Export Excel Report</button>
                <input type="file" id="uploadInput" class="hidden" accept=".xlsx, .xls" onchange="handleFileUpload(event)">
                <button onclick="document.getElementById('uploadInput').click()" class="bg-green-600 px-4 py-2 rounded font-bold hover:bg-green-700 uppercase">Sync Stock</button>
            </div>
        </div>

        <div class="overflow-x-auto shadow-xl border border-black">
            <table class="w-full border-collapse">
                <thead>
                    <tr class="yellow-header">
                        <th class="p-2 border border-black text-left">Category</th>
                        <th class="p-2 border border-black">Store Branch</th>
                        <th class="p-2 border border-black bg-blue-50">Base</th>
                        <th class="p-2 border border-black bg-yellow-50">Present</th>
                        <th class="p-2 border border-black">Gap</th>
                        <th class="p-2 border border-black bg-slate-800 text-white uppercase tracking-tighter">Smart Action Plan</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="font-medium text-center"></tbody>
            </table>
        </div>
    </div>

    <script>
        let stores = ["SG HYD", "SG", "SGRJY", "SGTNL", "SIRI ELR", "ST", "TUNI", "SIRICPT", "VS"];
        let inventoryData = [
            { name: "Silk Work (501-1000)", base: [185, 370, 185, 295, 245, 295, 345, 50, 295], present: [0,0,0,0,0,0,0,0,0] },
            { name: "BNS Handloom (501-1000)", base: [450, 1000, 450, 800, 700, 700, 800, 400, 800], present: [0,0,0,0,0,0,0,0,0] },
            { name: "Pattu (1001-2000)", base: [125, 150, 125, 200, 100, 175, 250, 100, 250], present: [0,0,0,0,0,0,0,0,0] },
            { name: "Handloom Cotton", base: [150, 300, 150, 300, 175, 100, 100, 150, 300], present: [0,0,0,0,0,0,0,0,0] }
        ];

        function getSmartLogic(cIdx, sIdx) {
            const cat = inventoryData[cIdx];
            const gap = cat.present[sIdx] - cat.base[sIdx];
            if (gap < 0) {
                const shortage = Math.abs(gap);
                let best = cat.present.map((p, i) => ({i, s: p - cat.base[i]})).filter(c => c.s > 5).sort((a,b) => b.s - a.s)[0];
                return best ? {type:'TRANSFER', qty: Math.min(shortage, best.s), from: stores[best.i]} : {type:'PURCHASE', qty: shortage};
            }
            return {type:'OK'};
        }

        function renderTable() {
            const body = document.getElementById('tableBody');
            let rows = "";
            inventoryData.forEach((cat, cIdx) => {
                cat.base.forEach((baseVal, sIdx) => {
                    const present = cat.present[sIdx];
                    const gap = present - baseVal;
                    const action = getSmartLogic(cIdx, sIdx);
                    
                    let actionHtml = "-";
                    if(action.type === 'PURCHASE') {
                        actionHtml = `<div class="action-container"><span class="text-purchase">PURCHASE ${action.qty}</span></div>`;
                    } else if (action.type === 'TRANSFER') {
                        actionHtml = `<div class="action-container"><span class="text-transfer">MOVE ${action.qty} FROM ${action.from}</span></div>`;
                    }

                    rows += `
                        <tr class="border-b border-black hover:bg-slate-50">
                            <td class="p-2 border-r border-black font-bold text-left uppercase bg-gray-50">${cat.name}</td>
                            <td class="table-cell font-black">${stores[sIdx]}</td>
                            <td class="table-cell font-bold text-slate-500">${baseVal}</td>
                            <td class="table-cell font-bold bg-yellow-50">${present}</td>
                            <td class="table-cell ${gap < 0 ? 'shortage' : 'surplus'}">${gap}</td>
                            <td class="table-cell">${actionHtml}</td>
                        </tr>`;
                });
            });
            body.innerHTML = rows;
        }

        function exportToExcel() {
            const reportData = [];
            inventoryData.forEach((cat, cIdx) => {
                cat.base.forEach((baseVal, sIdx) => {
                    const present = cat.present[sIdx];
                    const gap = present - baseVal;
                    const action = getSmartLogic(cIdx, sIdx);
                    
                    let instr = "STABLE";
                    if(action.type === 'PURCHASE') instr = `PURCHASE ${action.qty} UNITS`;
                    if(action.type === 'TRANSFER') instr = `TRANSFER ${action.qty} FROM ${action.from}`;

                    reportData.push({
                        "Category": cat.name,
                        "Store": stores[sIdx],
                        "Target Base": baseVal,
                        "Present Stock": present,
                        "Gap": gap,
                        "Alert Level": gap < 0 ? (action.type === 'PURCHASE' ? "CRITICAL" : "REBALANCE") : "OPTIMAL",
                        "Instruction": instr
                    });
                });
            });

            const ws = XLSX.utils.json_to_sheet(reportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Stock Action Report");
            XLSX.writeFile(wb, "Subham_Grand_Stock_Report.xlsx");
        }

        function handleFileUpload() {
            inventoryData.forEach(cat => cat.present = cat.base.map(b => Math.floor(b * (Math.random() * 1.5))));
            renderTable();
        }

        window.onload = renderTable;
    </script>
</body>
</html>
