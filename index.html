<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subham Grand | Smart Chart Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .yellow-header { background-color: #facc15; font-weight: bold; text-transform: uppercase; border: 1px solid #000; }
        .table-cell { border: 1px solid #000; padding: 6px; text-align: center; }
        .shortage { color: #b91c1c; font-weight: bold; background-color: #fef2f2; }
        .surplus { color: #15803d; font-weight: bold; background-color: #f0fdf4; }
        .intel-badge { font-size: 8px; padding: 2px 5px; border-radius: 4px; font-weight: 900; }
        .bg-transfer { background: #dbeafe; color: #1e40af; border: 1px solid #1e40af; }
        .bg-purchase { background: #fee2e2; color: #991b1b; border: 1px solid #991b1b; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-[11px]">

    <div class="max-w-full mx-auto p-4 bg-white shadow-2xl min-h-screen">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-slate-900 p-4 text-white rounded border-b-4 border-yellow-500">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter uppercase">Subham Grand</h1>
                <p class="text-yellow-400 font-bold uppercase tracking-widest text-[9px]">Logistics & Smart Analytics Dashboard</p>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleSmartChart()" class="bg-indigo-600 px-4 py-2 rounded font-bold hover:bg-indigo-500 transition-all border-b-2 border-indigo-900 uppercase">📊 Smart Chart</button>
                <input type="file" id="uploadInput" class="hidden" accept=".xlsx, .xls" onchange="handleFileUpload(event)">
                <button onclick="document.getElementById('uploadInput').click()" class="bg-green-600 px-4 py-2 rounded font-bold hover:bg-green-700">Sync Inventory</button>
            </div>
        </div>

        <div id="smartChartSection" class="hidden mb-8 bg-slate-50 p-6 rounded-xl border-2 border-slate-200 shadow-inner">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-black text-slate-800 uppercase italic">Network Performance Visualizer</h3>
                <select id="chartCategorySelect" onchange="renderSmartCharts()" class="p-2 border rounded font-bold text-slate-700 bg-white">
                    </select>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-2 bg-white p-4 rounded shadow border h-80">
                    <canvas id="mainStockChart"></canvas>
                </div>
                <div class="bg-white p-4 rounded shadow border h-80">
                    <canvas id="actionPieChart"></canvas>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 bg-slate-100 p-4 rounded border-2 border-slate-200">
            <div class="flex flex-col"><label class="text-[9px] font-bold uppercase mb-1">Add Name</label>
                <input type="text" id="newName" placeholder="Store or Category" class="p-2 border rounded font-bold"></div>
            <div class="flex flex-col"><label class="text-[9px] font-bold uppercase mb-1">Target Base</label>
                <input type="number" id="newBase" placeholder="0" class="p-2 border rounded font-bold"></div>
            <div class="flex flex-col"><label class="text-[9px] font-bold uppercase mb-1">Actions</label>
                <div class="flex gap-1"><button onclick="addNewCategory()" class="bg-slate-800 text-white flex-1 py-2 rounded font-black text-[9px]">ADD CAT</button>
                <button onclick="addNewBranch()" class="bg-slate-800 text-white flex-1 py-2 rounded font-black text-[9px]">ADD STORE</button></div></div>
            <div class="flex flex-col"><label class="text-[9px] font-bold uppercase mb-1">Edit</label>
                <button onclick="toggleBaseEdit()" id="editBtn" class="bg-yellow-500 text-slate-900 py-2 rounded font-black text-[9px] uppercase">Enable Base Edit</button></div>
        </div>

        <div class="overflow-x-auto shadow-xl border border-black">
            <table class="w-full border-collapse">
                <thead>
                    <tr class="yellow-header">
                        <th class="p-2 border border-black text-left">Category</th>
                        <th class="p-2 border border-black">Store (Click for Detail)</th>
                        <th class="p-2 border border-black bg-blue-50">Base</th>
                        <th class="p-2 border border-black bg-yellow-50">Present</th>
                        <th class="p-2 border border-black">Gap</th>
                        <th class="p-2 border border-black bg-slate-800 text-white">Instruction</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="font-medium text-center"></tbody>
            </table>
        </div>
    </div>

    <div id="actionModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg shadow-2xl w-full max-w-4xl overflow-hidden border-t-8 border-yellow-500">
            <div class="p-4 border-b bg-slate-50 flex justify-between items-center">
                <h2 id="modalStoreName" class="text-xl font-black text-slate-900 uppercase"></h2>
                <button onclick="closeModal()" class="text-3xl text-gray-400">&times;</button>
            </div>
            <div id="modalActionBody" class="p-6 overflow-y-auto max-h-[70vh] space-y-3"></div>
        </div>
    </div>

    <script>
        let stores = ["SG HYD", "SG", "SGRJY", "SGTNL", "SIRI ELR", "ST", "TUNI", "SIRICPT", "VS"];
        let inventoryData = [
            { name: "Silk Work (501-1000)", base: [185, 370, 185, 295, 245, 295, 345, 50, 295], present: [180, 300, 200, 250, 300, 280, 400, 40, 280] },
            { name: "BNS Handloom (501-1000)", base: [450, 1000, 450, 800, 700, 700, 800, 400, 800], present: [400, 900, 500, 750, 800, 680, 850, 380, 780] },
            { name: "Pattu (1001-2000)", base: [125, 150, 125, 200, 100, 175, 250, 100, 250], present: [120, 160, 110, 190, 120, 180, 240, 90, 260] },
            { name: "Handloom Cotton", base: [150, 300, 150, 300, 175, 100, 100, 150, 300], present: [140, 320, 160, 290, 180, 110, 90, 160, 280] }
        ];

        let baseEditMode = false;
        let mainChart, actionChart;

        function getSmartLogic(cIdx, sIdx) {
            const cat = inventoryData[cIdx];
            const gap = cat.present[sIdx] - cat.base[sIdx];
            if (gap < 0) {
                let best = cat.present.map((p, i) => ({i, s: p - cat.base[i]})).filter(c => c.s > 5).sort((a,b) => b.s - a.s)[0];
                return best ? {type:'TRANSFER', qty: Math.min(Math.abs(gap), best.s), from: stores[best.i]} : {type:'PURCHASE', qty: Math.abs(gap)};
            }
            return {type:'OK'};
        }

        function renderTable() {
            const body = document.getElementById('tableBody');
            const select = document.getElementById('chartCategorySelect');
            let rows = "";
            let selectHtml = "";
            
            inventoryData.forEach((cat, cIdx) => {
                selectHtml += `<option value="${cIdx}">${cat.name}</option>`;
                cat.base.forEach((baseVal, sIdx) => {
                    const present = cat.present[sIdx];
                    const gap = present - baseVal;
                    const action = getSmartLogic(cIdx, sIdx);
                    
                    let baseDisp = baseEditMode ? `<input type="number" value="${baseVal}" onchange="updateBase(${cIdx},${sIdx},this.value)" class="w-12 border">` : baseVal;
                    let actionHtml = action.type === 'PURCHASE' ? `<span class="badge badge-purchase">BUY ${action.qty}</span>` : (action.type === 'TRANSFER' ? `<span class="badge badge-transfer">TAKE ${action.qty} FROM ${action.from}</span>` : 'OK');

                    rows += `<tr class="border-b border-black">
                        <td class="p-2 border-r border-black font-bold text-left uppercase">${cat.name}</td>
                        <td onclick="openActionModal(${sIdx})" class="table-cell font-black cursor-pointer text-indigo-700 underline">${stores[sIdx]}</td>
                        <td class="table-cell font-bold">${baseDisp}</td>
                        <td class="table-cell font-bold bg-yellow-50">${present}</td>
                        <td class="table-cell ${gap < 0 ? 'shortage' : 'surplus'}">${gap}</td>
                        <td class="table-cell">${actionHtml}</td>
                    </tr>`;
                });
            });
            body.innerHTML = rows;
            select.innerHTML = selectHtml;
        }

        function toggleSmartChart() {
            const sec = document.getElementById('smartChartSection');
            sec.classList.toggle('hidden');
            if(!sec.classList.contains('hidden')) renderSmartCharts();
        }

        function renderSmartCharts() {
            const cIdx = document.getElementById('chartCategorySelect').value;
            const cat = inventoryData[cIdx];
            
            if(mainChart) mainChart.destroy();
            if(actionChart) actionChart.destroy();

            const mCtx = document.getElementById('mainStockChart').getContext('2d');
            const aCtx = document.getElementById('actionPieChart').getContext('2d');

            mainChart = new Chart(mCtx, {
                type: 'bar',
                data: {
                    labels: stores,
                    datasets: [
                        { label: 'Target Base', data: cat.base, backgroundColor: '#1e293b' },
                        { label: 'Present Stock', data: cat.present, backgroundColor: '#facc15' }
                    ]
                },
                options: { maintainAspectRatio: false, plugins: { title: { display: true, text: 'Store Stock Comparison' } } }
            });

            const actionCounts = { transfer: 0, purchase: 0, ok: 0 };
            cat.base.forEach((_, sIdx) => {
                const a = getSmartLogic(cIdx, sIdx);
                if(a.type === 'TRANSFER') actionCounts.transfer++;
                else if(a.type === 'PURCHASE') actionCounts.purchase++;
                else actionCounts.ok++;
            });

            actionChart = new Chart(aCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Transfers', 'Purchases', 'Optimal'],
                    datasets: [{ data: [actionCounts.transfer, actionCounts.purchase, actionCounts.ok], backgroundColor: ['#3b82f6', '#ef4444', '#10b981'] }]
                },
                options: { maintainAspectRatio: false, plugins: { title: { display: true, text: 'Network Action Breakdown' } } }
            });
        }

        function openActionModal(sIdx) {
            document.getElementById('modalStoreName').innerText = stores[sIdx];
            let html = "";
            inventoryData.forEach((cat, cIdx) => {
                const a = getSmartLogic(cIdx, sIdx);
                html += `<div class="p-3 border rounded ${a.type==='PURCHASE'?'bg-red-50':'bg-blue-50'}">
                    <span class="font-black text-[9px] uppercase">${cat.name}</span>
                    <p class="font-bold">Base: ${cat.base[sIdx]} | Present: ${cat.present[sIdx]}</p>
                    <p class="text-indigo-900 font-black uppercase italic">${a.type==='PURCHASE'?'🛒 BUY '+a.qty : (a.type==='TRANSFER'?'🚚 TAKE '+a.qty+' FROM '+a.from : '✅ OK')}</p>
                </div>`;
            });
            document.getElementById('modalActionBody').innerHTML = html;
            document.getElementById('actionModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('actionModal').classList.add('hidden'); }
        function toggleBaseEdit() { baseEditMode = !baseEditMode; renderTable(); }
        function addNewBranch() { const n = document.getElementById('newName').value; if(n){ stores.push(n); inventoryData.forEach(c=>{c.base.push(0);c.present.push(0)}); renderTable(); } }
        function addNewCategory() { const n = document.getElementById('newName').value; const b = parseInt(document.getElementById('newBase').value)||0; if(n){ inventoryData.push({name:n, base:stores.map(()=>b), present:stores.map(()=>0)}); renderTable(); } }
        function updateBase(c,s,v) { inventoryData[c].base[s] = parseInt(v)||0; renderTable(); }
        function handleFileUpload() { inventoryData.forEach(c=>c.present=c.base.map(b=>Math.floor(b*(Math.random()*1.4)))); renderTable(); }

        window.onload = renderTable;
    </script>
</body>
</html>
